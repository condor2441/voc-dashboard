<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS · 부동산</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f4f4f5; font-family:'Pretendard',system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .box { background:#fff; border:1px solid #e8e8ec; border-radius:20px; padding:48px 40px; width:340px; text-align:center; }
    .icon { font-size:2rem; margin-bottom:18px; }
    .title { font-size:1.1rem; font-weight:800; color:#1a1a1a; margin-bottom:4px; }
    .sub { font-size:0.82rem; color:#bbb; margin-bottom:28px; }
    .dots { display:flex; justify-content:center; gap:12px; margin-bottom:28px; }
    .dot { width:12px; height:12px; border-radius:50%; background:#e8e8ec; transition:background 0.15s; }
    .dot.filled { background:#f97316; }
    .dot.error { background:#ef4444; }
    .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .num { padding:16px; border-radius:12px; border:1px solid #e8e8ec; background:#fff; font-family:inherit; font-size:1.1rem; font-weight:600; color:#1a1a1a; cursor:pointer; transition:all 0.12s; }
    .num:hover { background:#f4f4f5; }
    .num:active { background:#e8e8ec; transform:scale(0.95); }
    .num.del { font-size:0.9rem; color:#999; border-color:transparent; background:none; }
    .num.empty { border-color:transparent; background:none; cursor:default; }
    .err { margin-top:16px; font-size:0.8rem; color:#ef4444; opacity:0; transition:opacity 0.2s; }
    .err.show { opacity:1; }
    .back { display:block; margin-top:24px; font-size:0.8rem; color:#bbb; text-decoration:none; }
    .back:hover { color:#999; }
  </style>
</head>
<body>
<div class="box">
  <div class="icon">🏠</div>
  <div class="title">부동산</div>
  <div class="sub">비밀번호를 입력하세요</div>
  <div class="dots" id="dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="num" onclick="input('1')">1</button><button class="num" onclick="input('2')">2</button><button class="num" onclick="input('3')">3</button>
    <button class="num" onclick="input('4')">4</button><button class="num" onclick="input('5')">5</button><button class="num" onclick="input('6')">6</button>
    <button class="num" onclick="input('7')">7</button><button class="num" onclick="input('8')">8</button><button class="num" onclick="input('9')">9</button>
    <button class="num empty"></button><button class="num" onclick="input('0')">0</button><button class="num del" onclick="del()">⌫</button>
  </div>
  <div class="err" id="err">비밀번호가 틀렸어요</div>
  <a href="../index.html" class="back">← KooVIS로 돌아가기</a>
</div>
<script>
  const PW_HASH = 'ad1e075215267a284972c5a764c35f9a38d52d89a9dd6706bd10b4a9860d56c0';
  const MAX = 5, LOCK = 30000;
  let entered = '';
  function state() { try { return JSON.parse(localStorage.getItem('_re_state')||'{}'); } catch { return {}; } }
  function setState(s) { localStorage.setItem('_re_state', JSON.stringify(s)); }
  function locked() { const {until}=state(); return until && Date.now()<until; }
  function updateDots() { for(let i=0;i<4;i++) document.getElementById('d'+i).className='dot'+(i<entered.length?' filled':''); }
  function input(n) {
    if(locked()||entered.length>=4) return;
    entered+=n; updateDots();
    if(entered.length===4) check();
  }
  function del() { if(locked()) return; entered=entered.slice(0,-1); updateDots(); document.getElementById('err').classList.remove('show'); }
  async function sha256(s) { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
  async function check() {
    const hash=await sha256(entered);
    if(hash===PW_HASH) { setState({}); sessionStorage.setItem('_re_tok',crypto.randomUUID()); location.href='dashboard.html'; return; }
    const s=state(), attempts=(s.attempts||0)+1;
    setState(attempts>=MAX?{attempts:0,until:Date.now()+LOCK}:{attempts});
    for(let i=0;i<4;i++) document.getElementById('d'+i).className='dot error';
    const err=document.getElementById('err');
    err.textContent=attempts>=MAX?'잠시 후 다시 시도하세요':`비밀번호가 틀렸어요 (${attempts}/${MAX})`;
    err.classList.add('show');
    setTimeout(()=>{ entered=''; updateDots(); err.classList.remove('show'); },800);
  }
  document.addEventListener('keydown',e=>{ if(e.key>='0'&&e.key<='9')input(e.key); if(e.key==='Backspace')del(); });
  if(locked()) { document.querySelector('.numpad').style.opacity='0.4'; document.querySelector('.numpad').style.pointerEvents='none'; document.getElementById('err').textContent='잠시 후 다시 시도하세요'; document.getElementById('err').classList.add('show'); }
</script>
</body>
</html>
