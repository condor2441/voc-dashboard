<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실거래가 — 데모</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --accent:#f97316; --text:#1a1a1a; --muted:#888;
      --border:#e8e8ec; --bg:#f4f4f5; --white:#fff; --radius:14px;
      --up:#10b981; --down:#ef4444;
    }
    body { background:var(--bg); font-family:'Pretendard',system-ui,sans-serif; color:var(--text); min-height:100vh; padding-bottom:40px; }

    /* ── Header ── */
    .header { background:linear-gradient(135deg,#1a1a1a,#2d2d2d); padding:16px 20px; position:sticky; top:0; z-index:10; }
    .header-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .back-btn { font-size:0.78rem; color:#aaa; text-decoration:none; padding:5px 12px; border:1px solid #444; border-radius:20px; }
    .header-apt { font-size:1rem; font-weight:900; color:#fff; flex:1; }
    .header-loc { font-size:0.72rem; color:#777; }
    .demo-badge { font-size:0.68rem; font-weight:700; background:#f97316; color:#fff; padding:3px 8px; border-radius:8px; flex-shrink:0; }

    /* ── 검색 ── */
    .search-bar { display:flex; gap:8px; }
    .search-input { flex:1; background:rgba(255,255,255,0.08); border:1px solid #444; border-radius:10px; padding:10px 14px; font-size:0.85rem; font-family:inherit; color:#fff; outline:none; }
    .search-input::placeholder { color:#666; }
    .search-input:focus { border-color:#f97316; }
    .search-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:0 16px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .map-btn { background:rgba(255,255,255,0.08); color:#aaa; border:1px solid #444; border-radius:10px; padding:0 12px; font-size:0.8rem; cursor:pointer; font-family:inherit; white-space:nowrap; }

    .main { max-width:680px; margin:0 auto; padding:16px; }

    /* ── 평형 탭 ── */
    .pyeong-tabs { display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; scrollbar-width:none; }
    .pyeong-tabs::-webkit-scrollbar { display:none; }
    .ptab { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:var(--white); font-size:0.8rem; font-weight:700; color:var(--muted); cursor:pointer; font-family:inherit; white-space:nowrap; transition:all 0.15s; }
    .ptab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ── 통계 카드 ── */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .stat-card { background:var(--white); border-radius:var(--radius); padding:12px 10px; text-align:center; border:1px solid var(--border); }
    .stat-label { font-size:0.65rem; font-weight:600; color:var(--muted); margin-bottom:4px; }
    .stat-val { font-size:0.88rem; font-weight:900; }
    .stat-val.up { color:var(--up); }
    .stat-val.down { color:var(--down); }
    .stat-sub { font-size:0.62rem; color:#ccc; margin-top:2px; }

    /* ── 거래 리스트 ── */
    .list-header { display:grid; grid-template-columns:2fr 1fr 1fr 1.2fr 0.8fr; gap:8px; padding:8px 14px; background:#f8f8fa; border-radius:10px 10px 0 0; border:1px solid var(--border); border-bottom:none; font-size:0.7rem; font-weight:700; color:var(--muted); }
    .trade-list { background:var(--white); border:1px solid var(--border); border-radius:0 0 var(--radius) var(--radius); overflow:hidden; }
    .trade-item { display:grid; grid-template-columns:2fr 1fr 1fr 1.2fr 0.8fr; gap:8px; padding:12px 14px; border-bottom:1px solid #f4f4f5; align-items:center; cursor:pointer; transition:background 0.12s; }
    .trade-item:last-child { border-bottom:none; }
    .trade-item:hover { background:#fafafa; }
    .trade-item.highlight { background:#fff7ed; }
    .trade-date { font-size:0.78rem; color:var(--muted); }
    .trade-date strong { display:block; font-size:0.85rem; font-weight:800; color:var(--text); }
    .trade-area { font-size:0.82rem; font-weight:600; }
    .trade-area small { display:block; font-size:0.68rem; color:#bbb; }
    .trade-floor { font-size:0.82rem; color:var(--muted); }
    .trade-price { font-size:0.9rem; font-weight:900; color:var(--accent); }
    .trade-change { font-size:0.72rem; font-weight:700; }
    .trade-change.up { color:var(--up); }
    .trade-change.down { color:var(--down); }
    .trade-change.flat { color:#bbb; }

    /* ── 관심 추가 버튼 ── */
    .watch-fab { position:fixed; bottom:24px; right:20px; background:var(--accent); color:#fff; border:none; border-radius:24px; padding:13px 20px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 4px 16px rgba(249,115,22,0.4); display:flex; align-items:center; gap:6px; }

    /* ── 빈 상태 ── */
    .empty { text-align:center; padding:48px 20px; color:var(--muted); font-size:0.85rem; }

    @media(max-width:480px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .list-header { grid-template-columns:2fr 1fr 1.2fr; }
      .list-header .col-area, .list-header .col-floor { display:none; }
      .trade-item { grid-template-columns:2fr 1fr 1.2fr; }
      .trade-item .trade-area, .trade-item .trade-floor { display:none; }
    }
  </style>
</head>
<script>if (!sessionStorage.getItem('_re_tok')) location.replace('index.html');</script>
<body>

<header class="header">
  <div class="header-top">
    <a href="demo.html" class="back-btn">← 대시보드</a>
    <div style="flex:1">
      <div class="header-apt" id="aptTitle">힐스테이트 기흥</div>
      <div class="header-loc">경기도 용인시 기흥구 · 언남동</div>
    </div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="다른 단지명 검색…" value="힐스테이트 기흥">
    <button class="search-btn" onclick="">검색</button>
    <button class="map-btn" onclick="location.href='map.html'">🗺 지도</button>
  </div>
</header>

<main class="main">

  <!-- 평형 탭 -->
  <div class="pyeong-tabs" id="pyeongTabs"></div>

  <!-- 통계 -->
  <div class="stats-row" id="statsRow"></div>

  <!-- 거래 리스트 -->
  <div class="list-header">
    <span>날짜</span>
    <span class="col-area">면적</span>
    <span class="col-floor">층</span>
    <span>거래금액</span>
    <span>전월대비</span>
  </div>
  <div class="trade-list" id="tradeList"></div>

</main>

<button class="watch-fab" onclick="alert('관심단지에 추가됩니다')">★ 관심단지 추가</button>

<script>
// ── 샘플 데이터 ──────────────────────────────────────────────────
const TRADES = [
  // 25평 (84㎡)
  {pyeong:25, area:84.9, floor:8,  price:165000, date:'2025-04-25'},
  {pyeong:25, area:84.9, floor:15, price:168000, date:'2025-04-18'},
  {pyeong:25, area:84.9, floor:3,  price:162000, date:'2025-04-10'},
  {pyeong:25, area:84.9, floor:11, price:166000, date:'2025-04-02'},
  {pyeong:25, area:84.9, floor:7,  price:161000, date:'2025-03-28'},
  {pyeong:25, area:84.9, floor:19, price:170000, date:'2025-03-15'},
  {pyeong:25, area:84.9, floor:5,  price:159000, date:'2025-03-08'},
  {pyeong:25, area:84.9, floor:12, price:163000, date:'2025-03-01'},
  {pyeong:25, area:84.9, floor:9,  price:158000, date:'2025-02-22'},
  {pyeong:25, area:84.9, floor:4,  price:156000, date:'2025-02-11'},
  {pyeong:25, area:84.9, floor:14, price:160000, date:'2025-02-05'},
  {pyeong:25, area:84.9, floor:17, price:164000, date:'2025-01-24'},
  // 34평 (112㎡)
  {pyeong:34, area:112.3, floor:10, price:215000, date:'2025-04-22'},
  {pyeong:34, area:112.3, floor:6,  price:210000, date:'2025-04-14'},
  {pyeong:34, area:112.3, floor:20, price:223000, date:'2025-04-05'},
  {pyeong:34, area:112.3, floor:8,  price:208000, date:'2025-03-20'},
  {pyeong:34, area:112.3, floor:3,  price:205000, date:'2025-03-10'},
  {pyeong:34, area:112.3, floor:15, price:218000, date:'2025-02-28'},
  {pyeong:34, area:112.3, floor:11, price:212000, date:'2025-02-15'},
  {pyeong:34, area:112.3, floor:7,  price:200000, date:'2025-01-30'},
  // 45평 (148㎡)
  {pyeong:45, area:148.2, floor:12, price:285000, date:'2025-04-20'},
  {pyeong:45, area:148.2, floor:5,  price:278000, date:'2025-03-25'},
  {pyeong:45, area:148.2, floor:18, price:292000, date:'2025-03-12'},
  {pyeong:45, area:148.2, floor:9,  price:282000, date:'2025-02-20'},
  {pyeong:45, area:148.2, floor:14, price:275000, date:'2025-01-15'},
];

const MY_PRICE = {25: 153000, 34: null, 45: null};

let activePyeong = 25;

function pyeongs() {
  return [...new Set(TRADES.map(t=>t.pyeong))].sort((a,b)=>a-b);
}

function filtered() {
  return TRADES.filter(t=>t.pyeong===activePyeong)
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function fmt(manwon) {
  const e=Math.floor(manwon/10000), r=manwon%10000;
  return e===0?`${r.toLocaleString()}만`:(r===0?`${e}억`:`${e}억 ${r.toLocaleString()}만`);
}

function fmtDate(d) {
  const dt=new Date(d);
  return `${dt.getFullYear()-2000}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

function renderTabs() {
  const el=document.getElementById('pyeongTabs');
  el.innerHTML = pyeongs().map(p=>`
    <button class="ptab ${p===activePyeong?'active':''}" onclick="selectPyeong(${p})">
      ${p}평 <span style="font-weight:400;font-size:.7rem">(${TRADES.find(t=>t.pyeong===p)?.area}㎡)</span>
    </button>`).join('');
}

function renderStats() {
  const list = filtered();
  if (!list.length) return;
  const prices = list.map(t=>t.price);
  const latest = list[0].price;
  const prev = list[1]?.price;
  const diff = prev ? latest - prev : 0;
  const pct = prev ? ((diff/prev)*100).toFixed(1) : 0;
  const max = Math.max(...prices);
  const min = Math.min(...prices);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">최근 거래가</div>
      <div class="stat-val">${fmt(latest)}</div>
      <div class="stat-sub">${fmtDate(list[0].date)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">전월 대비</div>
      <div class="stat-val ${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'} ${fmt(Math.abs(diff))}</div>
      <div class="stat-sub">${diff>=0?'+':''}${pct}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🏔 전고점</div>
      <div class="stat-val" style="color:#f97316">${fmt(max)}</div>
      <div class="stat-sub">조회기간 내</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">거래량</div>
      <div class="stat-val">${list.length}건</div>
      <div class="stat-sub">최근 6개월</div>
    </div>`;
}

function renderList() {
  const list = filtered();
  if (!list.length) {
    document.getElementById('tradeList').innerHTML = '<div class="empty">거래 내역이 없어요</div>';
    return;
  }
  const myP = MY_PRICE[activePyeong];
  document.getElementById('tradeList').innerHTML = list.map((t,i)=>{
    const prev = list[i+1];
    const diff = prev ? t.price - prev.price : 0;
    const changeHtml = diff===0 || !prev
      ? '<span class="trade-change flat">—</span>'
      : diff>0
        ? `<span class="trade-change up">▲ ${fmt(diff)}</span>`
        : `<span class="trade-change down">▼ ${fmt(Math.abs(diff))}</span>`;
    const isMyPrice = myP && Math.abs(t.price - myP) < 2000;
    return `
      <div class="trade-item ${isMyPrice?'highlight':''}">
        <div class="trade-date">
          <strong>${fmtDate(t.date)}</strong>
          ${isMyPrice?'<span style="font-size:.65rem;color:#f97316;font-weight:700">내 매수가 근처</span>':''}
        </div>
        <div class="trade-area">${t.area}㎡<small>${t.pyeong}평</small></div>
        <div class="trade-floor">${t.floor}층</div>
        <div class="trade-price">${fmt(t.price)}</div>
        ${changeHtml}
      </div>`;
  }).join('');
}

function selectPyeong(p) {
  activePyeong = p;
  renderTabs();
  renderStats();
  renderList();
}

renderTabs();
renderStats();
renderList();
</script>
</body>
</html>
