<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS · 실거래가</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --accent:#f97316; --text:#1a1a1a; --muted:#999; --border:#e8e8ec;
      --bg:#f4f4f5; --white:#fff; --radius:12px;
      --up:#10b981; --down:#ef4444;
    }
    body { background:var(--bg); font-family:'Pretendard',system-ui,sans-serif; color:var(--text); min-height:100vh; padding-bottom:40px; }

    .nav { background:var(--white); border-bottom:1px solid var(--border); height:56px; display:flex; align-items:center; padding:0 24px; gap:16px; position:sticky; top:0; z-index:20; }
    .nav-back { text-decoration:none; color:var(--muted); font-size:0.85rem; transition:color 0.15s; flex-shrink:0; }
    .nav-back:hover { color:var(--text); }
    .nav-apt { font-size:0.95rem; font-weight:800; flex:1; }
    .nav-loc { font-size:0.72rem; color:var(--muted); font-weight:400; margin-left:6px; }
    .nav-actions { display:flex; gap:8px; }
    .nav-btn { font-size:0.82rem; color:var(--muted); background:none; border:1px solid var(--border); border-radius:8px; padding:5px 12px; cursor:pointer; font-family:inherit; transition:all 0.15s; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
    .search-bar { display:flex; gap:8px; padding:10px 24px; background:var(--white); border-bottom:1px solid var(--border); }
    .search-input { flex:1; padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-size:0.85rem; font-family:inherit; outline:none; transition:border-color 0.2s; }
    .search-input:focus { border-color:var(--accent); }
    .search-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:0 16px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; }

    .main { max-width:840px; margin:0 auto; padding:24px; }

    .pyeong-tabs { display:flex; gap:4px; margin-bottom:16px; }
    .ptab { padding:6px 16px; border-radius:8px; border:1px solid var(--border); background:var(--white); font-size:0.82rem; font-weight:600; color:var(--muted); cursor:pointer; font-family:inherit; transition:all 0.15s; }
    .ptab.active { background:var(--text); border-color:var(--text); color:#fff; }

    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
    .stat-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:14px 14px; }
    .stat-label { font-size:0.65rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
    .stat-val { font-size:0.95rem; font-weight:900; }
    .stat-sub { font-size:0.66rem; color:#bbb; margin-top:3px; }
    .mini-gauge { height:3px; background:#ebebef; border-radius:2px; margin-top:6px; overflow:hidden; }
    .mini-fill { height:100%; border-radius:2px; }

    .list-card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .list-head { display:grid; grid-template-columns:1.4fr 0.8fr 0.6fr 1.2fr 1fr; gap:6px; padding:10px 18px; background:#f8f8fa; border-bottom:1px solid var(--border); font-size:0.68rem; font-weight:700; color:var(--muted); }
    .trade-row { display:grid; grid-template-columns:1.4fr 0.8fr 0.6fr 1.2fr 1fr; gap:6px; padding:13px 18px; border-bottom:1px solid #f4f4f5; align-items:center; transition:background 0.12s; cursor:pointer; }
    .trade-row:last-child { border-bottom:none; }
    .trade-row:hover { background:#fafafa; }
    .trade-row.highlight { background:#fff7ed; }
    .td-date { font-size:0.78rem; color:var(--muted); }
    .td-date strong { display:block; font-size:0.84rem; font-weight:800; color:var(--text); }
    .td-area { font-size:0.82rem; font-weight:600; }
    .td-area small { display:block; font-size:0.66rem; color:#bbb; }
    .td-floor { font-size:0.82rem; color:var(--muted); }
    .td-price { font-size:0.9rem; font-weight:900; color:var(--accent); }
    .td-change { font-size:0.72rem; font-weight:700; }
    .ch-up { color:var(--down); } .ch-dn { color:var(--up); } .ch-flat { color:#bbb; }
    .my-badge { font-size:0.6rem; font-weight:700; background:var(--accent); color:#fff; padding:1px 5px; border-radius:4px; margin-top:2px; display:inline-block; }

    @media(max-width:600px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .list-head { grid-template-columns:1.4fr 1.2fr 1fr; }
      .list-head .ha, .list-head .hf { display:none; }
      .trade-row { grid-template-columns:1.4fr 1.2fr 1fr; }
      .trade-row .td-area, .trade-row .td-floor { display:none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="dashboard-demo.html" class="nav-back">← 대시보드</a>
  <div style="flex:1">
    <span class="nav-apt">힐스테이트 기흥</span>
    <span class="nav-loc">경기 용인시 기흥구</span>
  </div>
  <div class="nav-actions">
    <a href="map-demo.html" class="nav-btn">🗺 지도</a>
  </div>
</nav>
<div class="search-bar">
  <input class="search-input" placeholder="다른 단지 검색…" value="힐스테이트 기흥">
  <button class="search-btn">검색</button>
</div>

<main class="main">
  <div class="pyeong-tabs">
    <button class="ptab active" onclick="selectPyeong(25,this)">25평 (84.9㎡)</button>
    <button class="ptab" onclick="selectPyeong(34,this)">34평 (112.3㎡)</button>
    <button class="ptab" onclick="selectPyeong(45,this)">45평 (148.2㎡)</button>
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div class="list-card">
    <div class="list-head">
      <span>거래일</span><span class="ha">면적</span><span class="hf">층</span><span>거래금액</span><span>전건 대비</span>
    </div>
    <div id="tradeList"></div>
  </div>
</main>

<script>
const TRADES = {
  25:[{date:'2025-04-25',area:84.9,floor:8,price:165000},{date:'2025-04-18',area:84.9,floor:15,price:168000},{date:'2025-04-10',area:84.9,floor:3,price:162000},{date:'2025-04-02',area:84.9,floor:11,price:166000},{date:'2025-03-28',area:84.9,floor:7,price:161000},{date:'2025-03-15',area:84.9,floor:19,price:170000},{date:'2025-03-08',area:84.9,floor:5,price:159000},{date:'2025-03-01',area:84.9,floor:12,price:163000},{date:'2025-02-22',area:84.9,floor:9,price:158000},{date:'2025-02-11',area:84.9,floor:4,price:156000},{date:'2025-02-05',area:84.9,floor:14,price:160000},{date:'2025-01-24',area:84.9,floor:17,price:164000}],
  34:[{date:'2025-04-22',area:112.3,floor:10,price:215000},{date:'2025-04-14',area:112.3,floor:6,price:210000},{date:'2025-04-05',area:112.3,floor:20,price:223000},{date:'2025-03-20',area:112.3,floor:8,price:208000},{date:'2025-03-10',area:112.3,floor:3,price:205000},{date:'2025-02-28',area:112.3,floor:15,price:218000},{date:'2025-02-15',area:112.3,floor:11,price:212000},{date:'2025-01-30',area:112.3,floor:7,price:200000}],
  45:[{date:'2025-04-20',area:148.2,floor:12,price:285000},{date:'2025-03-25',area:148.2,floor:5,price:278000},{date:'2025-03-12',area:148.2,floor:18,price:292000},{date:'2025-02-20',area:148.2,floor:9,price:282000},{date:'2025-01-15',area:148.2,floor:14,price:275000}]
};
const MY={25:153000,34:null,45:null};
function fmt(m){const e=Math.floor(m/10000),r=m%10000;return e===0?`${r.toLocaleString()}만`:(r===0?`${e}억`:`${e}억 ${r.toLocaleString()}만`);}
function fd(d){return d.replace(/(\d{4})-(\d{2})-(\d{2})/,(_,y,m,d)=>`${y.slice(2)}.${m}.${d}`);}
function renderStats(p){
  const list=TRADES[p],prices=list.map(t=>t.price),latest=list[0].price,prev=list[1]?.price;
  const diff=prev?latest-prev:0,pct=prev?((diff/prev)*100).toFixed(1):0;
  const intensity=Math.min(100,Math.max(20,50+(parseFloat(pct)*10)));
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">최근 거래가</div><div class="stat-val" style="color:var(--accent)">${fmt(latest)}</div><div class="stat-sub">${fd(list[0].date)}</div></div>
    <div class="stat-card"><div class="stat-label">전건 대비</div><div class="stat-val ${diff>=0?'ch-up':'ch-dn'}">${diff===0?'—':diff>0?`▲ ${fmt(diff)}`:`▼ ${fmt(Math.abs(diff))}`}</div><div class="stat-sub">${diff>=0?'+':''}${pct}%</div></div>
    <div class="stat-card"><div class="stat-label">🏔 전고점</div><div class="stat-val" style="color:#bbb">${fmt(Math.max(...prices))}</div><div class="stat-sub">조회 기간 내</div></div>
    <div class="stat-card"><div class="stat-label">매매 강도</div><div class="stat-val" style="font-size:.82rem;color:${intensity>=60?'#10b981':intensity>=35?'#f59e0b':'#bbb'}">${intensity>=60?'강함 🔥':intensity>=35?'보통 ⚡':'약함'}</div><div class="mini-gauge"><div class="mini-fill" style="width:${intensity}%;background:${intensity>=60?'#10b981':intensity>=35?'#f59e0b':'#bbb'}"></div></div></div>`;
}
function renderList(p){
  const list=TRADES[p],myP=MY[p];
  document.getElementById('tradeList').innerHTML=list.map((t,i)=>{
    const prev=list[i+1],diff=prev?t.price-prev.price:0;
    const ch=!prev?'<span class="ch-flat">—</span>':diff>0?`<span class="ch-up">▲ ${fmt(diff)}</span>`:diff<0?`<span class="ch-dn">▼ ${fmt(Math.abs(diff))}</span>`:'<span class="ch-flat">—</span>';
    const ismy=myP&&Math.abs(t.price-myP)<2000;
    return `<div class="trade-row${ismy?' highlight':''}">
      <div class="td-date"><strong>${fd(t.date)}</strong>${ismy?'<span class="my-badge">내 매수가</span>':''}</div>
      <div class="td-area">${t.area}㎡<small>${Math.round(t.area/3.305785)}평</small></div>
      <div class="td-floor">${t.floor}층</div>
      <div class="td-price">${fmt(t.price)}</div>
      <div class="td-change">${ch}</div></div>`;
  }).join('');
}
function selectPyeong(p,btn){document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b===btn));renderStats(p);renderList(p);}
renderStats(25);renderList(25);
</script>
</body>
</html>
