<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS · 부동산 지도</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=fd6c9cbf55b7520e804aa68f1804a0a8&libraries=services"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --accent:#f97316; --text:#1a1a1a; --muted:#888;
      --border:#e8e8ec; --bg:#f4f4f5; --white:#fff;
      --up:#10b981; --down:#ef4444;
    }
    body { font-family:'Pretendard',system-ui,sans-serif; color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    /* ── Header ── */
    .header { background:var(--white); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; position:relative; }
    .header-top { display:flex; align-items:center; gap:10px; padding:12px 16px 10px; }
    .back-btn { font-size:0.78rem; color:var(--muted); text-decoration:none; padding:5px 12px; border:1px solid var(--border); border-radius:20px; flex-shrink:0; transition:color 0.2s,border-color 0.2s; }
    .back-btn:hover { color:var(--accent); border-color:var(--accent); }
    .header-title { font-size:0.95rem; font-weight:800; flex:1; }
    .search-bar { display:flex; gap:8px; padding:0 16px 12px; }
    .search-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:9px 14px; font-size:0.85rem; font-family:inherit; color:var(--text); outline:none; transition:border-color 0.2s; }
    .search-input:focus { border-color:var(--accent); }
    .search-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:0 16px; font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit; }

    #map { flex:1; }

    /* ── 가격 버블 ── */
    .price-bubble {
      background:#fff;
      border-radius:20px;
      padding:6px 12px;
      font-family:'Pretendard',system-ui,sans-serif;
      font-size:0.8rem;
      font-weight:800;
      white-space:nowrap;
      box-shadow:0 3px 12px rgba(0,0,0,0.15);
      border:2px solid transparent;
      cursor:pointer;
      transition:transform 0.15s, box-shadow 0.15s;
      position:relative;
      display:inline-block;
    }
    .price-bubble::after {
      content:'';
      position:absolute;
      bottom:-8px; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
    }
    .price-bubble.up   { color:var(--down); border-color:var(--down); }
    .price-bubble.up::after { border-top-color:var(--down); }
    .price-bubble.down { color:var(--up); border-color:var(--up); }
    .price-bubble.down::after { border-top-color:var(--up); }
    .price-bubble.flat { color:#555; border-color:#bbb; }
    .price-bubble.flat::after { border-top-color:#bbb; }
    .price-bubble.home { color:var(--accent); border-color:var(--accent); background:#fff7ed; }
    .price-bubble.home::after { border-top-color:var(--accent); }
    .price-bubble:hover { transform:translateY(-2px) scale(1.08); box-shadow:0 6px 18px rgba(0,0,0,0.18); }
    .price-bubble.active { transform:translateY(-2px) scale(1.1); }

    /* ── 검색 결과 ── */
    .search-results { position:absolute; top:100%; left:16px; right:16px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.12); z-index:2000; overflow:hidden; display:none; max-height:200px; overflow-y:auto; border:1px solid var(--border); }
    .search-result-item { padding:11px 16px; font-size:0.85rem; cursor:pointer; border-bottom:1px solid #f4f4f5; }
    .search-result-item:last-child { border-bottom:none; }
    .search-result-item:hover { background:#fff7ed; }
    .search-result-name { font-weight:700; }
    .search-result-addr { font-size:0.72rem; color:var(--muted); margin-top:2px; }

    /* ── 범례 ── */
    .legend { position:absolute; top:12px; right:12px; z-index:400; background:rgba(255,255,255,0.95); border-radius:12px; padding:10px 12px; font-size:0.72rem; box-shadow:0 2px 8px rgba(0,0,0,0.08); border:1px solid var(--border); }
    .legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .legend-item:last-child { margin-bottom:0; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

    /* ── 하단 패널 ── */
    .bottom-panel {
      position:absolute; bottom:0; left:0; right:0;
      background:var(--white); border-radius:20px 20px 0 0;
      padding:14px 16px 28px;
      box-shadow:0 -4px 24px rgba(0,0,0,0.1);
      transform:translateY(100%);
      transition:transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
      z-index:500;
    }
    .bottom-panel.show { transform:translateY(0); }
    .panel-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:0 auto 14px; }
    .panel-badge { font-size:0.7rem; font-weight:700; padding:3px 8px; border-radius:8px; display:inline-block; margin-bottom:6px; }
    .panel-badge.home { background:#fff7ed; color:#f97316; }
    .panel-badge.watch { background:#f4f4f5; color:#888; }
    .panel-name { font-size:1.05rem; font-weight:900; margin-bottom:2px; }
    .panel-loc { font-size:0.73rem; color:var(--muted); margin-bottom:14px; }
    .panel-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .panel-stat { background:var(--bg); border-radius:10px; padding:10px; text-align:center; }
    .panel-stat-label { font-size:0.64rem; color:var(--muted); font-weight:600; margin-bottom:3px; }
    .panel-stat-val { font-size:0.88rem; font-weight:900; }
    .panel-actions { display:flex; gap:8px; }
    .panel-btn-primary { flex:1; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:12px; font-size:0.88rem; font-weight:700; cursor:pointer; font-family:inherit; transition:background 0.2s; }
    .panel-btn-primary:hover { background:#ea6c0a; }
    .panel-btn-secondary { background:none; border:1px solid var(--border); color:var(--muted); border-radius:12px; padding:12px 16px; font-size:0.88rem; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
<script>if (!sessionStorage.getItem('_re_tok')) location.replace('index.html');</script>

<header class="header">
  <div class="header-top">
    <a href="dashboard.html" class="back-btn">← 대시보드</a>
    <span class="header-title">🗺 지도로 보기</span>
  </div>
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="단지명 또는 지역 검색 (예: 힐스테이트 기흥)"
      oninput="onSearchInput()" onkeydown="if(event.key==='Enter') doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> 전월 상승</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> 전월 하락</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> 우리집</div>
</div>

<div class="bottom-panel" id="bottomPanel">
  <div class="panel-handle"></div>
  <div id="panelContent"></div>
</div>

<script>
const APTS = [
  { id:1, name:'힐스테이트 기흥', loc:'경기 용인시 기흥구 언남동', lat:37.2748, lng:127.1155, isHome:true,  pyeong:25, price:165000, prev:162000, peak:170000, trades:12 },
  { id:2, name:'기흥역 롯데캐슬 스카이엘', loc:'경기 용인시 기흥구 마북동', lat:37.2695, lng:127.1148, pyeong:25, price:143000, prev:147000, peak:152000, trades:8 },
  { id:3, name:'기흥 KCC스위첸', loc:'경기 용인시 기흥구 구갈동', lat:37.2812, lng:127.1098, pyeong:34, price:186000, prev:183000, peak:190000, trades:5 },
  { id:4, name:'동백 센트레빌', loc:'경기 용인시 기흥구 중동', lat:37.2630, lng:127.1210, pyeong:25, price:128000, prev:128000, peak:135000, trades:4 },
  { id:5, name:'기흥 자이', loc:'경기 용인시 기흥구 신갈동', lat:37.2780, lng:127.1230, pyeong:34, price:195000, prev:188000, peak:202000, trades:7 },
  { id:6, name:'보정동 아이파크', loc:'경기 용인시 기흥구 보정동', lat:37.2560, lng:127.1088, pyeong:25, price:115000, prev:118000, peak:122000, trades:3 },
  { id:7, name:'기흥역 반도유보라', loc:'경기 용인시 기흥구 마북동', lat:37.2710, lng:127.1180, pyeong:25, price:138000, prev:135000, peak:145000, trades:6 },
];

function fmt(m) {
  const e=Math.floor(m/10000), r=m%10000;
  return e===0?`${r.toLocaleString()}만`:(r===0?`${e}억`:`${e}억 ${r.toLocaleString()}만`);
}

kakao.maps.load(() => {
  const mapEl = document.getElementById('map');
  const map = new kakao.maps.Map(mapEl, {
    center: new kakao.maps.LatLng(37.2735, 127.1155),
    level: 5,
  });

  const overlays = {};

  APTS.forEach(apt => {
    const diff = apt.price - apt.prev;
    const cls = apt.isHome ? 'home' : diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '';
    const label = apt.isHome ? `🏠 ${fmt(apt.price)}` : `${arrow} ${fmt(apt.price)}`;

    const div = document.createElement('div');
    div.className = `price-bubble ${cls}`;
    div.innerHTML = label;
    div.addEventListener('click', () => showPanel(apt.id));

    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(apt.lat, apt.lng),
      content: div,
      yAnchor: 1.3,
    });
    overlay.setMap(map);
    overlays[apt.id] = { overlay, div };
  });

  kakao.maps.event.addListener(map, 'click', closePanel);

  const ps = new kakao.maps.services.Places();

  window.doSearch = function() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    document.getElementById('searchResults').style.display = 'none';
    ps.keywordSearch(q, (result, status) => {
      if (status === kakao.maps.services.Status.OK && result.length) {
        const r = result[0];
        const pos = new kakao.maps.LatLng(r.y, r.x);
        map.panTo(pos);
        map.setLevel(4);
        const match = APTS.find(a => a.name.includes(q) || q.includes(a.name.split(' ')[0]));
        if (match) showPanel(match.id);
      } else {
        alert('검색 결과가 없어요');
      }
    }, { category_group_code: '' });
  };

  window.onSearchInput = function() {
    const q = document.getElementById('searchInput').value.trim();
    if (q.length < 2) { document.getElementById('searchResults').style.display = 'none'; return; }
    ps.keywordSearch(q + ' 아파트', (result, status) => {
      const el = document.getElementById('searchResults');
      if (status === kakao.maps.services.Status.OK && result.length) {
        el.style.display = 'block';
        el.innerHTML = result.slice(0,5).map(r => `
          <div class="search-result-item" onclick="selectResult(${r.y},${r.x},'${r.place_name.replace(/'/g,"\\'")}')">
            <div class="search-result-name">${r.place_name}</div>
            <div class="search-result-addr">${r.address_name}</div>
          </div>`).join('');
      } else {
        el.style.display = 'none';
      }
    });
  };

  window.selectResult = function(lat, lng, name) {
    document.getElementById('searchInput').value = name;
    document.getElementById('searchResults').style.display = 'none';
    const pos = new kakao.maps.LatLng(lat, lng);
    map.panTo(pos);
    map.setLevel(4);
    const match = APTS.find(a => a.name.includes(name.split(' ')[1] || name.split(' ')[0]));
    if (match) showPanel(match.id);
  };

  window.showPanel = function(id) {
    const apt = APTS.find(a=>a.id===id);
    if (!apt) return;
    Object.values(overlays).forEach(({div}) => div.classList.remove('active'));
    if (overlays[id]) overlays[id].div.classList.add('active');
    const diff = apt.price - apt.prev;
    const pct = ((diff/apt.prev)*100).toFixed(1);
    const diffStr = diff===0 ? '변동없음'
      : diff>0 ? `▲ ${fmt(diff)} (+${pct}%)` : `▼ ${fmt(Math.abs(diff))} (${pct}%)`;
    const diffColor = diff>0 ? '#ef4444' : diff<0 ? '#10b981' : '#aaa';
    document.getElementById('panelContent').innerHTML = `
      <div class="panel-badge ${apt.isHome?'home':'watch'}">${apt.isHome?'🏠 우리집':'★ 관심단지'}</div>
      <div class="panel-name">${apt.name}</div>
      <div class="panel-loc">${apt.loc} · ${apt.pyeong}평 기준</div>
      <div class="panel-stats">
        <div class="panel-stat"><div class="panel-stat-label">최근 거래가</div><div class="panel-stat-val" style="color:#f97316">${fmt(apt.price)}</div></div>
        <div class="panel-stat"><div class="panel-stat-label">전월 대비</div><div class="panel-stat-val" style="color:${diffColor}">${diffStr}</div></div>
        <div class="panel-stat"><div class="panel-stat-label">🏔 전고점</div><div class="panel-stat-val">${fmt(apt.peak)}</div></div>
      </div>
      <div class="panel-actions">
        <button class="panel-btn-primary" onclick="location.href='dashboard.html'">대시보드 →</button>
        <button class="panel-btn-secondary" onclick="closePanel()">✕</button>
      </div>`;
    document.getElementById('bottomPanel').classList.add('show');
    map.panTo(new kakao.maps.LatLng(apt.lat - 0.003, apt.lng));
  };

  window.closePanel = function() {
    document.getElementById('bottomPanel').classList.remove('show');
    Object.values(overlays).forEach(({div}) => div.classList.remove('active'));
  };

  document.addEventListener('click', e => {
    const results = document.getElementById('searchResults');
    if (!results.contains(e.target) && !e.target.closest('.search-bar')) {
      results.style.display = 'none';
    }
  });

  setTimeout(() => showPanel(1), 800);
});
</script>
</body>
</html>
