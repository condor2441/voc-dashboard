<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS · 투자</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f4f4f5;
      font-family: 'Pretendard', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-box {
      background: #fff;
      border: 1px solid #e8e8ec;
      border-radius: 20px;
      padding: 48px 40px;
      width: 340px;
      text-align: center;
    }

    .lock-icon {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .lock-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .lock-sub {
      font-size: 0.82rem;
      color: #bbb;
      margin-bottom: 28px;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .pin-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e8e8ec;
      transition: background 0.15s;
    }

    .pin-dot.filled { background: #1a1a1a; }
    .pin-dot.error  { background: #f87171; }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .num-btn {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #e8e8ec;
      background: #fff;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.12s;
    }

    .num-btn:hover  { background: #f4f4f5; }
    .num-btn:active { background: #e8e8ec; transform: scale(0.96); }

    .num-btn.del {
      font-size: 0.9rem;
      color: #999;
      border-color: transparent;
      background: none;
    }

    .num-btn.empty {
      border-color: transparent;
      background: none;
      cursor: default;
    }

    .error-msg {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #f87171;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.show { opacity: 1; }

    .back-link {
      display: block;
      margin-top: 24px;
      font-size: 0.8rem;
      color: #bbb;
      text-decoration: none;
    }

    .back-link:hover { color: #999; }
  </style>
</head>
<body>

<div class="lock-box">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">투자</div>
  <div class="lock-sub">비밀번호를 입력하세요</div>

  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>

  <div class="numpad">
    <button class="num-btn" onclick="input('1')">1</button>
    <button class="num-btn" onclick="input('2')">2</button>
    <button class="num-btn" onclick="input('3')">3</button>
    <button class="num-btn" onclick="input('4')">4</button>
    <button class="num-btn" onclick="input('5')">5</button>
    <button class="num-btn" onclick="input('6')">6</button>
    <button class="num-btn" onclick="input('7')">7</button>
    <button class="num-btn" onclick="input('8')">8</button>
    <button class="num-btn" onclick="input('9')">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" onclick="input('0')">0</button>
    <button class="num-btn del" onclick="del()">⌫</button>
  </div>

  <div class="error-msg" id="errorMsg">비밀번호가 틀렸어요</div>
  <a href="../index.html" class="back-link">← KooVIS로 돌아가기</a>
</div>

<script>
  const PW = '2441';
  let entered = '';

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).className =
        'pin-dot' + (i < entered.length ? ' filled' : '');
    }
  }

  function input(n) {
    if (entered.length >= 4) return;
    entered += n;
    updateDots();
    if (entered.length === 4) check();
  }

  function del() {
    entered = entered.slice(0, -1);
    updateDots();
    document.getElementById('errorMsg').classList.remove('show');
  }

  function check() {
    if (entered === PW) {
      sessionStorage.setItem('invest_auth', '1');
      window.location.href = 'dashboard.html';
    } else {
      for (let i = 0; i < 4; i++)
        document.getElementById('d' + i).className = 'pin-dot error';
      document.getElementById('errorMsg').classList.add('show');
      setTimeout(() => {
        entered = '';
        updateDots();
        document.getElementById('errorMsg').classList.remove('show');
      }, 800);
    }
  }

  // 키보드 지원
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') input(e.key);
    if (e.key === 'Backspace') del();
  });
</script>

</body>
</html>
