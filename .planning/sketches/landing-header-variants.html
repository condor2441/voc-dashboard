<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS Header Variants</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #eee; font-family: 'Pretendard', system-ui, sans-serif; padding: 40px 20px; }

    .label {
      text-align: center; font-size: 0.75rem; font-weight: 700;
      color: #999; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 12px;
    }

    .variant {
      background: #f7f7f9;
      border-radius: 24px;
      padding: 60px 40px;
      max-width: 560px;
      margin: 0 auto 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid #e0e0e0;
    }

    /* ── A안: 그라데이션 로고 ── */
    .a-badge {
      display: inline-block;
      background: #f0fdf9;
      color: #00c6a9;
      border: 1px solid #d0f5ec;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .a-logo {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #1a1a1a 0%, #1a1a1a 40%, #00c6a9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 14px;
    }

    .a-sub {
      font-size: 0.9rem;
      color: #888;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* ── B안: 시간 표시 ── */
    .b-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .b-logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -0.04em;
    }

    .b-logo span { color: #00c6a9; }

    .b-dot { width: 4px; height: 4px; background: #ccc; border-radius: 50%; }

    .b-time {
      font-size: 1rem;
      font-weight: 500;
      color: #999;
      font-variant-numeric: tabular-nums;
    }

    .b-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .b-sub {
      font-size: 0.85rem;
      color: #aaa;
    }

    /* ── C안: 영문 임팩트 ── */
    .c-logo {
      font-size: 1rem;
      font-weight: 700;
      color: #00c6a9;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .c-title {
      font-size: 2.8rem;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .c-title em {
      font-style: normal;
      color: #00c6a9;
    }

    .c-sub {
      font-size: 0.85rem;
      color: #aaa;
      max-width: 280px;
    }

    .c-line {
      width: 40px;
      height: 3px;
      background: #00c6a9;
      border-radius: 2px;
      margin: 16px auto;
    }
  </style>
</head>
<body>

  <!-- A안 -->
  <div class="label">A안 — 그라데이션 로고</div>
  <div class="variant">
    <div class="a-badge">Private Dashboard</div>
    <div class="a-logo">KooVIS</div>
    <div class="a-sub">업무와 투자를 한 곳에서</div>
  </div>

  <!-- B안 -->
  <div class="label">B안 — 실시간 시계 + 임팩트 타이틀</div>
  <div class="variant">
    <div class="b-top">
      <div class="b-logo">Koo<span>VIS</span></div>
      <div class="b-dot"></div>
      <div class="b-time" id="clock">--:--</div>
    </div>
    <div class="b-title">나만의<br>커맨드 센터</div>
    <div class="b-sub">업무 · 투자 · 데이터를 한 곳에서</div>
  </div>

  <!-- C안 -->
  <div class="label">C안 — 영문 서브타이틀 임팩트</div>
  <div class="variant">
    <div class="c-logo">KooVIS</div>
    <div class="c-title">Your Personal<br><em>Command</em> Center</div>
    <div class="c-line"></div>
    <div class="c-sub">업무, 투자, 스마트폰 분석을 하나의 대시보드로</div>
  </div>

<script>
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}`;
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
