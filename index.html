<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KooVIS</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f7f7f9;
      color: #1a1a1a;
      font-family: 'Pretendard', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,198,169,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── 헤더: 좌우 분할 ── */
    .header {
      display: flex;
      align-items: center;
      gap: 28px;
      max-width: 540px;
      width: 100%;
      margin-bottom: 36px;
      padding: 28px 32px;
      background: #fff;
      border: 1px solid #ebebef;
      border-radius: 20px;
    }

    .header-logo {
      flex-shrink: 0;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .logo span { color: #00c6a9; }

    .divider {
      width: 1px;
      height: 52px;
      background: #ebebef;
      flex-shrink: 0;
    }

    .header-text {}
    .header-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 5px;
    }
    .header-desc {
      font-size: 0.78rem;
      color: #bbb;
      line-height: 1.7;
    }

    /* ── 카드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 540px;
    }

    .card {
      background: #fff;
      border: 1px solid #ebebef;
      border-radius: 18px;
      padding: 26px 22px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card.work::before    { background: linear-gradient(90deg, #3b82f6, #00c6a9); }
    .card.invest::before  { background: linear-gradient(90deg, #00c6a9, #10b981); }
    .card.estate::before  { background: linear-gradient(90deg, #f97316, #fb923c); }
    .card.lotto::before   { background: linear-gradient(90deg, #eab308, #f59e0b); }
    .card.etc::before     { background: linear-gradient(90deg, #8b5cf6, #6366f1); }

    .card:hover {
      box-shadow: 0 12px 36px rgba(0,0,0,0.09);
      transform: translateY(-4px);
      border-color: #d8d8e0;
    }
    .card:hover::before { opacity: 1; }

    .card-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    .card.work .card-icon   { background: #eff6ff; }
    .card.invest .card-icon { background: #f0fdf9; }
    .card.estate .card-icon { background: #fff7ed; }
    .card.lotto .card-icon  { background: #fefce8; }
    .card.etc .card-icon    { background: #f5f3ff; }

    .card-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 5px;
      letter-spacing: -0.02em;
    }

    .card-desc {
      font-size: 0.76rem;
      color: #bbb;
      line-height: 1.8;
    }

    .card-arrow {
      position: absolute;
      bottom: 18px; right: 18px;
      font-size: 0.9rem;
      color: #e0e0e0;
      transition: color 0.2s, transform 0.2s;
    }
    .card:hover .card-arrow { color: #00c6a9; transform: translateX(3px); }

    .card.etc {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
    }
    .card.etc .card-icon { margin-bottom: 0; flex-shrink: 0; }
    .card.etc .card-title { font-size: 0.88rem; margin-bottom: 2px; }
    .card.etc .card-arrow { bottom: 50%; transform: translateY(50%); }
    .card.etc:hover .card-arrow { transform: translateY(50%) translateX(3px); }

    .footer {
      margin-top: 28px;
      font-size: 0.68rem;
      color: #ccc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .header { gap: 16px; padding: 20px; }
      .logo { font-size: 2rem; }
      .divider { height: 40px; }
      .grid { gap: 10px; }
      .card { padding: 20px 16px; border-radius: 14px; }
      .card.etc { padding: 14px 16px; }
      .card-arrow { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">
      <div class="logo">Koo<span>VIS</span></div>
    </div>
    <div class="divider"></div>
    <div class="header-text">
      <div class="header-title">나만의 커맨드 센터</div>
      <div class="header-desc">업무 · 투자 · 스마트폰 DB<br>모든 정보를 한 곳에서</div>
    </div>
  </header>

  <div class="grid">

    <a href="work/index.html" class="card work">
      <div class="card-icon">💼</div>
      <div class="card-title">업무</div>
      <div class="card-desc">기술 뉴스<br>스마트폰 DB <span id="phoneCount" style="color:#ddd"></span></div>
      <div class="card-arrow">→</div>
    </a>

    <a href="invest/index.html" class="card invest">
      <div class="card-icon">📈</div>
      <div class="card-title">투자</div>
      <div class="card-desc" id="investDesc">포트폴리오 · 브리핑<br>시황 뉴스</div>
      <div class="card-arrow">→</div>
    </a>

    <a href="realestate/auth.html" class="card estate">
      <div class="card-icon">🏠</div>
      <div class="card-title">부동산</div>
      <div class="card-desc">시세 · 청약<br>매물 분석</div>
      <div class="card-arrow">→</div>
    </a>

    <a href="lotto/auth.html" class="card lotto">
      <div class="card-icon">🎱</div>
      <div class="card-title">로또</div>
      <div class="card-desc">당첨 번호<br>통계 분석</div>
      <div class="card-arrow">→</div>
    </a>

    <a href="#" class="card etc">
      <div class="card-icon">＋</div>
      <div>
        <div class="card-title">기타</div>
        <div class="card-desc">필요할 때 추가</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <footer class="footer">KooVIS · Private</footer>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : 'https://api.koo-vis.com';

  async function loadStats() {
    const [phonesRes, ovRes] = await Promise.allSettled([
      fetch(`${API}/phones`),
      fetch(`${API}/invest/overview`)
    ]);

    if (phonesRes.status === 'fulfilled') {
      try {
        const phones = await phonesRes.value.json();
        const el = document.getElementById('phoneCount');
        if (el && phones.length) el.textContent = `· ${phones.length}개`;
      } catch(e) {}
    }

    if (ovRes.status === 'fulfilled') {
      try {
        const ov = await ovRes.value.json();
        const desc = document.getElementById('investDesc');
        if (desc && ov.total_buy > 0) {
          const pct   = ov.total_pct;
          const color = pct >= 0 ? '#10b981' : '#ef4444';
          desc.innerHTML = `포트폴리오 · 브리핑<br>수익률 <span style="color:${color};font-weight:700">${pct >= 0 ? '+' : ''}${pct}%</span>`;
        }
      } catch(e) {}
    }
  }

  loadStats();
</script>

</body>
</html>
