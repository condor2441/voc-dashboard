<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartphone VOC Dashboard — Multi-Model</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #0f1117; color: #e2e8f0; font-size: 13px; line-height: 1.5; }
  .page { max-width: 1280px; margin: 0 auto; padding: 24px 20px 60px; }
  .section { margin-bottom: 32px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #64748b; border-bottom: 1px solid #1e293b; padding-bottom: 6px; margin-bottom: 14px; }


  /* BRAND SELECTOR */
  .brand-selector { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 12px 0 0; margin-bottom: 0; display: flex; gap: 4px; flex-wrap: wrap; }
  .brand-btn { background: transparent; border: 1px solid #334155; color: #64748b; padding: 6px 18px; border-radius: 6px 6px 0 0; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; letter-spacing: 0.5px; border-bottom: none; }
  .brand-btn:hover { color: #94a3b8; border-color: #475569; }
  .brand-btn.active { background: #1e293b; border-color: #334155; color: #f1f5f9; }
  .model-selector { border-radius: 0 8px 8px 8px; margin-top: 0; }

  /* MODEL SELECTOR */
  .model-selector { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 20px; display: flex; gap: 6px; flex-wrap: wrap; }
  .model-btn { background: #334155; border: 1px solid #475569; color: #94a3b8; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .model-btn:hover { background: #475569; }
  .model-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 12px; padding: 24px 28px; margin-bottom: 28px; }
  .model-name { font-size: 26px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.5px; }
  .brand-badge { display: inline-block; background: #dc2626; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; margin-left: 10px; vertical-align: middle; }
  .segment-badge { display: inline-block; background: #7c3aed; color: #fff; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .header-meta { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: #94a3b8; }
  .meta-item span { color: #cbd5e1; font-weight: 600; }
  .conclusion-bar { margin-top: 14px; background: #1e3a5f; border-left: 3px solid #3b82f6; padding: 8px 14px; border-radius: 0 6px 6px 0; font-size: 13px; color: #bfdbfe; font-weight: 500; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); gap: 12px; }
  .kpi-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px 18px; }
  .kpi-card.highlight { border-color: #3b82f6; background: #1e3a5f; }
  .kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #64748b; margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 800; line-height: 1; }
  .kpi-sub { font-size: 11px; color: #64748b; margin-top: 4px; }
  .c-pos { color: #34d399; } .c-neg { color: #f87171; } .c-neu { color: #60a5fa; } .c-warn { color: #fbbf24; }

  /* TABLES */
  .tbl-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #1e293b; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: #1e293b; }
  th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #64748b; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid #1a2234; color: #cbd5e1; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #162032; }

  /* TAGS */
  .tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .tag-pos { background: #064e3b; color: #34d399; }
  .tag-neg { background: #450a0a; color: #f87171; }
  .tag-neu { background: #1e3a5f; color: #93c5fd; }
  .tag-cat { background: #1e1b4b; color: #a5b4fc; }
  .tag-gap { background: #451a03; color: #fb923c; }
  .tag-ok  { background: #052e16; color: #4ade80; }
  .tag-part { background: #1c1917; color: #a8a29e; }
  .tag-H { background: #450a0a; color: #fca5a5; }

  /* TABS (VOC) */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
  .tab-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 6px; cursor: pointer; }
  .tab-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* BAR CHART */
  .bar-chart { display: flex; flex-direction: column; gap: 7px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { width: 150px; font-size: 11px; color: #94a3b8; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: #0f172a; border-radius: 4px; height: 16px; overflow: hidden; display: flex; }
  .bfp { background: #059669; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 3px; font-size: 10px; color: #fff; font-weight: 700; min-width: 0; }
  .bfn { background: #dc2626; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 3px; font-size: 10px; color: #fff; font-weight: 700; min-width: 0; }
  .bar-n { width: 28px; font-size: 11px; color: #475569; text-align: right; }

  /* TREND */
  .trend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .trend-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px 16px; }
  .trend-period { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
  .trend-stat { font-size: 13px; margin-bottom: 4px; }
  .trend-note { font-size: 11px; color: #64748b; margin-top: 6px; }

  /* INSIGHT */
  .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .insight-col { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 18px; }
  .insight-col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .ic-display { color: #60a5fa; } .ic-product { color: #a78bfa; }
  .insight-item { display: flex; gap: 10px; margin-bottom: 12px; font-size: 12px; color: #cbd5e1; line-height: 1.5; }
  .in { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
  .in-d { background: #1e3a5f; color: #60a5fa; }
  .in-p { background: #2e1065; color: #a78bfa; }

  /* FORMULA */
  .formula-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 11px; color: #64748b; line-height: 2.2; }
  .fl strong { color: #60a5fa; }

  .spec-key { color: #94a3b8; font-weight: 600; white-space: nowrap; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  @media (max-width: 768px) {
    .insight-grid, .two-col { grid-template-columns: 1fr; }
    .trend-grid { grid-template-columns: 1fr; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .model-selector { flex-direction: column; }
  }
</style>
</head>

let currentModel = 'iqoo15';

/* ===== BRAND DATA ===== */
const brandMap = {
  vivo:    { label: 'vivo / iQOO', keys: ['iqoo15', 'iqoo15ultra'] },
  OnePlus: { label: 'OnePlus',     keys: ['op15'] },
  Samsung: { label: 'Samsung',     keys: ['s25u', 's26u'] },
  Apple:   { label: 'Apple',       keys: ['ip16'] }
};
let currentBrand = 'vivo';

function initBrandSelector() {
  const el = document.getElementById('brand-selector');
  el.innerHTML = Object.entries(brandMap).map(([b, info]) =>
    `<button class="brand-btn${b === currentBrand ? ' active' : ''}" onclick="switchBrand('${b}')">${info.label}</button>`
  ).join('');
}

function switchBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderModelSelector();
}

function renderModelSelector() {
  const keys = brandMap[currentBrand].keys;
  const sel = document.querySelector('.model-selector');
  // 버튼 유지 (첫 번째 strong 태그 제외 재생성)
  const strong = sel.querySelector('strong');
  sel.innerHTML = '';
  if (strong) sel.appendChild(strong);
  keys.forEach((k, i) => {
    const btn = document.createElement('button');
    btn.className = 'model-btn' + (i === 0 ? ' active' : '');
    btn.textContent = models[k].name;
    btn.onclick = () => switchModel(k);
    sel.appendChild(btn);
  });
  switchModel(keys[0]);
}



/* ===== RENDER FUNCTIONS ===== */
function switchModel(key) {
  currentModel = key;
  document.querySelectorAll('.model-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(models)[i] === key);
  });
  renderAll();
}

function switchVocTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['global','china','combined'][i] === t);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
}

function renderHeader() {
  const m = models[currentModel];
  const html = `${m.name}<span class="brand-badge">${m.brand}</span><span class="segment-badge">${m.segment}</span>`;
  document.querySelector('.model-name').innerHTML = html;

  const meta = `
    <div class="meta-item">출시 <span>${m.launch}</span></div>
    <div class="meta-item">시장 <span>${m.market}</span></div>
    <div class="meta-item">분석 기준 <span>${m.date}</span></div>
    <div class="meta-item">표본 <span>${m.sampleN > 0 ? 'n=' + m.sampleN : '미수집'}</span></div>
  `;
  document.getElementById('h-meta').innerHTML = meta;
  document.getElementById('h-conclusion').textContent = m.conclusion;
}

function renderKPI() {
  const m = models[currentModel];
  const grid = document.getElementById('kpi-grid');
  if (!m.kpi || Object.keys(m.kpi).length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#475569;padding:20px">데이터 미수집</div>';
    return;
  }
  grid.innerHTML = Object.values(m.kpi).map(k => `
    <div class="kpi-card${k.highlight ? ' highlight' : ''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value ${k.color}">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>
  `).join('');
}

function renderLaunch() {
  const m = models[currentModel];
  const tbody = document.getElementById('launch-tbody');
  if (!m.launchTable || m.launchTable.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#475569">데이터 미수집</td></tr>';
    return;
  }
  tbody.innerHTML = m.launchTable.map(r => `
    <tr>
      <td><span class="tag tag-cat">${r.cat}</span></td>
      <td>${r.claim}</td>
      <td>${r.reality}</td>
      <td>${r.quant}</td>
      <td><span class="tag ${r.tag}">${r.label}</span></td>
    </tr>
  `).join('');
}

function renderVOC(data, tbodyId, barId) {
  const tbody = document.getElementById(tbodyId);
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#475569">데이터 미수집</td></tr>';
    return;
  }
  const mx = Math.max(...data.map(d => d.n));
  tbody.innerHTML = data.map(d => `
    <tr>
      <td><span class="tag tag-cat">${d.cat}</span></td>
      <td><strong>${d.n}</strong></td>
      <td class="c-pos">${d.pos}</td>
      <td class="c-neg">${d.neg}</td>
      <td>${d.str > 0 ? `<span class="tag tag-H">${d.str}</span>` : '—'}</td>
      <td style="font-size:11px;color:#64748b">${d.note || '—'}</td>
    </tr>
  `).join('');

  const bar = document.getElementById(barId);
  bar.innerHTML = data.map(d => {
    const pw = Math.round((d.pos / mx) * 100);
    const nw = Math.round((d.neg / mx) * 100);
    return `<div class="bar-row">
      <div class="bar-label">${d.cat}</div>
      <div class="bar-track">
        <div class="bfp" style="width:${pw}%">${d.pos > 0 ? d.pos : ''}</div>
        <div class="bfn" style="width:${nw}%">${d.neg > 0 ? d.neg : ''}</div>
      </div>
      <div class="bar-n">${d.n}</div>
    </div>`;
  }).join('');
}

function renderTrend() {
  const m = models[currentModel];
  const grid = document.getElementById('trend-grid');
  if (!m.trend || m.trend.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#475569;padding:20px">데이터 미수집</div>';
    return;
  }
  grid.innerHTML = m.trend.map(t => `
    <div class="trend-card">
      <div class="trend-period">${t.period}</div>
      <div class="trend-stat">긍정 <span class="c-pos" style="font-size:18px;font-weight:800">${t.pos}%</span> / 부정 <span class="c-neg" style="font-size:18px;font-weight:800">${t.neg}%</span></div>
      <div class="trend-note">${t.note}</div>
    </div>
  `).join('');

  const tbody = document.getElementById('trend-tbody');
  tbody.innerHTML = m.trend.map(t => `
    <tr>
      <td>${t.period}</td>
      <td>${t.issue}</td>
      <td class="c-pos">${t.pos}%</td>
      <td class="c-neg">${t.neg}%</td>
      <td>${t.uid}</td>
      <td style="font-size:11px;color:#64748b">${t.src}</td>
    </tr>
  `).join('');
}

function renderSpec() {
  const m = models[currentModel];
  const tbody = document.getElementById('spec-tbody');
  if (!m.specs || m.specs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#475569">데이터 미수집</td></tr>';
    return;
  }
  tbody.innerHTML = m.specs.map(s => `
    <tr>
      <td class="spec-key">${s.key}</td>
      <td>${s.val}</td>
      <td style="font-size:11px;color:#64748b">${s.note || ''}</td>
    </tr>
  `).join('');
}

function renderCoding() {
  const m = models[currentModel];
  const tbody = document.getElementById('coding-tbody');
  if (!m.codingSample || m.codingSample.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#475569">데이터 미수집</td></tr>';
    return;
  }
  const sentMap = { '긍정': 'tag-pos', '부정': 'tag-neg' };
  const intMap = { '강': 'tag-H', '중': 'tag-M', '약': 'tag-L' };
  tbody.innerHTML = m.codingSample.map(c => `
    <tr>
      <td>${c.sum}</td>
      <td><span class="tag ${sentMap[c.sent]}">${c.sent}</span></td>
      <td><span class="tag tag-cat">${c.cat}</span></td>
      <td><span class="tag ${intMap[c.int]}">${c.int}</span></td>
      <td style="font-size:11px;color:#94a3b8">${c.src}</td>
      <td style="font-size:11px;color:#64748b;white-space:nowrap">${c.date}</td>
      <td style="font-size:11px;color:#64748b">${c.note || '—'}</td>
    </tr>
  `).join('');
}

function renderInsights() {
  const m = models[currentModel];
  const dInsights = document.getElementById('display-insights');
  const pInsights = document.getElementById('product-insights');

  if (!m.displayInsights || m.displayInsights.length === 0) {
    dInsights.innerHTML = '<div style="color:#475569;padding:10px">데이터 미수집</div>';
    pInsights.innerHTML = '<div style="color:#475569;padding:10px">데이터 미수집</div>';
    return;
  }

  dInsights.innerHTML = m.displayInsights.map((d, i) => `
    <div class="insight-item">
      <div class="in in-d">${i + 1}</div>
      <div>${d}</div>
    </div>
  `).join('');

  pInsights.innerHTML = m.productInsights.map((p, i) => `
    <div class="insight-item">
      <div class="in in-p">${i + 1}</div>
      <div>${p}</div>
    </div>
  `).join('');
}

function renderFormula() {
  const m = models[currentModel];
  const box = document.getElementById('formula-box');
  box.innerHTML = m.formula || '<div style="color:#475569">데이터 미수집</div>';
}

function renderFooter() {
  const m = models[currentModel];
  const footer = document.getElementById('footer');
  footer.innerHTML = m.sampleN > 0
    ? `VOC Dashboard · ${m.name} · 가상 데이터 없음 · 분석일 ${m.date}`
    : `VOC Dashboard · ${m.name} · [데이터 미수집 상태] · 분석일 ${m.date}`;
}

function renderAll() {
  renderHeader();
  renderKPI();
  renderLaunch();

  // 탭 버튼에 모수 표시
  const m = models[currentModel];
  const globalN = m.global ? m.global.reduce((sum, d) => sum + d.n, 0) : 0;
  const chinaN = m.china ? m.china.reduce((sum, d) => sum + d.n, 0) : 0;
  const combinedN = m.combined ? m.combined.reduce((sum, d) => sum + d.n, 0) : 0;

  const tabBar = document.querySelector('.tab-bar');
  tabBar.innerHTML = `
    <button class="tab-btn active" onclick="switchVocTab('global')">🌐 글로벌 VOC (n=${globalN})</button>
    <button class="tab-btn" onclick="switchVocTab('china')">🇨🇳 중국 VOC (n=${chinaN})</button>
    <button class="tab-btn" onclick="switchVocTab('combined')">📊 통합 (n=${combinedN})</button>
  `;

  renderVOC(models[currentModel].global, 'g-tbody', 'g-bar');
  renderVOC(models[currentModel].china, 'c-tbody', 'c-bar');
  renderVOC(models[currentModel].combined, 'm-tbody', 'm-bar');
  renderTrend();
  renderSpec();
  renderCoding();
  renderInsights();
  renderFormula();
  renderFooter();
}

// INIT
initBrandSelector();
renderModelSelector();
</script>
