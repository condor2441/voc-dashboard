<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBC Review</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f4f5; color: #1a1a1a; font-family: 'Pretendard', system-ui, sans-serif; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin   { to { transform:rotate(360deg); } }
    .fade { animation: fadeUp .35s ease forwards; }
    .fade-d1 { opacity:0; animation-delay:.05s; }
    .fade-d2 { opacity:0; animation-delay:.12s; }
    .fade-d3 { opacity:0; animation-delay:.20s; }
    .fade-d4 { opacity:0; animation-delay:.28s; }

    /* NAV */
    .nav { background:rgba(255,255,255,.92); backdrop-filter:blur(12px); border-bottom:1px solid #e8e8ec;
           padding:0 32px; height:54px; display:flex; align-items:center; justify-content:space-between;
           position:sticky; top:0; z-index:100; }
    .nav-back { font-size:.82rem; color:#999; text-decoration:none; transition:color .15s; }
    .nav-back:hover { color:#1a1a1a; }
    .nav-score { font-size:1.1rem; font-weight:800; color:#7c3aed; }

    /* HERO */
    .hero { background:linear-gradient(160deg,#1a1a1a 0%,#2d2d3a 60%,#1a1a1a 100%); color:#fff; padding:52px 32px 44px; }
    .hero-inner { max-width:960px; margin:0 auto; display:grid; grid-template-columns:1fr 360px; gap:40px; align-items:center; }
    .hero-tag { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#a78bfa; margin-bottom:10px; }
    .hero-title { font-size:1.7rem; font-weight:800; line-height:1.25; margin-bottom:14px; }
    .hero-sub { font-size:.88rem; color:#a0a0b8; line-height:1.7; max-width:500px; }
    .hero-img-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
    .hero-img { width:100%; border-radius:14px; box-shadow:0 28px 70px rgba(0,0,0,.6); object-fit:cover; max-height:280px; }
    .score-badge { position:absolute; top:-10px; right:-10px; width:76px; height:76px; border-radius:50%;
      background:linear-gradient(135deg,#7c3aed,#a78bfa); display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 8px 24px rgba(124,58,237,.5); }
    .score-badge-num { font-size:1.5rem; font-weight:800; color:#fff; line-height:1; }
    .score-badge-pct { font-size:.6rem; color:rgba(255,255,255,.65); }

    /* MAIN */
    .main { max-width:960px; margin:0 auto; padding:36px 24px; }
    .section-header { margin-bottom:14px; }
    .section-title { font-size:1rem; font-weight:700; }
    .section-sub   { font-size:.78rem; color:#999; margin-top:3px; }
    .card { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:20px 24px; }

    /* PROS/CONS */
    .pc-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:36px; }
    .pc-box  { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:16px 18px; }
    .pc-title { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
    .pc-title.pro { color:#059669; }
    .pc-title.con { color:#dc2626; }
    .pc-item { font-size:.8rem; color:#444; line-height:1.6; display:flex; gap:7px; margin-bottom:2px; }

    /* RATING BARS */
    .rating-section { margin-bottom:36px; }
    .rating-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 32px; }
    .rating-row { display:flex; align-items:center; gap:10px; }
    .rating-label { font-size:.77rem; color:#555; width:150px; flex-shrink:0; }
    .rating-bar-wrap { flex:1; height:5px; background:#e8e8ec; border-radius:4px; overflow:hidden; }
    .rating-bar-fill { height:5px; border-radius:4px; transition:width 1.1s cubic-bezier(.4,0,.2,1); }
    .rating-val { font-size:.77rem; font-weight:700; width:36px; text-align:right; flex-shrink:0; }

    /* SPEC CARDS */
    .spec-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:36px; }
    .spec-card { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:16px 18px; }
    .spec-icon  { font-size:1.2rem; margin-bottom:8px; }
    .spec-name  { font-size:.7rem; color:#999; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
    .spec-val   { font-size:.88rem; font-weight:700; }
    .spec-note  { font-size:.7rem; color:#bbb; margin-top:3px; }

    /* DISPLAY METRICS */
    .display-section { margin-bottom:36px; }
    .display-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
    .display-metric { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:14px; text-align:center; }
    .display-metric-val  { font-size:1.2rem; font-weight:800; }
    .display-metric-unit { font-size:.65rem; color:#999; font-weight:600; }
    .display-metric-label{ font-size:.7rem; color:#bbb; margin-top:3px; }

    /* BRIGHTNESS MAP */
    .bmap-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .bmap-cell { border-radius:8px; padding:10px 4px; text-align:center; font-size:.78rem; font-weight:700; color:#fff; }

    /* THERMAL */
    .thermal-section { margin-bottom:36px; }
    .thermal-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .thermal-card { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:18px 20px; }
    .thermal-card-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#999; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
    .thermal-badge { padding:2px 8px; border-radius:6px; font-size:.65rem; font-weight:700; }
    .badge-idle { background:#d1fae5; color:#065f46; }
    .badge-load { background:#fee2e2; color:#991b1b; }
    .temp-map  { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:10px; }
    .temp-cell { border-radius:8px; padding:9px 4px; text-align:center; font-size:.8rem; font-weight:700; color:#fff; transition:transform .15s; cursor:default; }
    .temp-cell:hover { transform:scale(1.06); }
    .temp-stat-row { display:flex; justify-content:space-between; font-size:.73rem; padding-top:9px; border-top:1px solid #f4f4f5; }
    .temp-stat-label { color:#bbb; margin-bottom:2px; }
    .temp-stat-val   { font-weight:700; }

    /* BENCHMARKS */
    .bench-section { margin-bottom:36px; }
    .bench-card { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:18px 24px; }
    .bench-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#999; margin-bottom:14px; }
    .bench-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
    .bench-label { font-size:.75rem; color:#555; width:200px; flex-shrink:0; }
    .bench-bar-wrap { flex:1; height:7px; background:#e8e8ec; border-radius:4px; overflow:hidden; }
    .bench-bar-fill { height:7px; border-radius:4px; background:linear-gradient(90deg,#1a1a1a,#555); transition:width 1.1s cubic-bezier(.4,0,.2,1); }
    .bench-val { font-size:.75rem; font-weight:700; width:90px; text-align:right; flex-shrink:0; }

    /* BATTERY */
    .battery-row { display:flex; align-items:center; gap:16px; background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:18px 24px; margin-bottom:36px; }
    .battery-icon { font-size:2.2rem; }
    .battery-val  { font-size:1.5rem; font-weight:800; color:#059669; }

    /* REVIEW TEXT */
    .review-card { background:#fff; border:1px solid #e8e8ec; border-radius:12px; padding:22px 26px; margin-bottom:36px; }
    .review-card p { font-size:.87rem; line-height:1.8; color:#333; margin-bottom:12px; }
    .review-card p:last-child { margin-bottom:0; }

    /* FINAL VERDICT */
    .final-verdict { background:linear-gradient(135deg,#1a1a1a,#2d2d3a); color:#fff; border-radius:14px; padding:28px 32px; display:flex; align-items:center; gap:28px; }
    .final-circle { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#7c3aed,#a78bfa); display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 8px 28px rgba(124,58,237,.5); }
    .final-num   { font-size:1.9rem; font-weight:800; line-height:1; }
    .final-label { font-size:.62rem; color:rgba(255,255,255,.6); margin-top:2px; }
    .final-text h3 { font-size:1rem; font-weight:700; margin-bottom:8px; }
    .final-text p  { font-size:.83rem; color:#a0a0b8; line-height:1.7; }

    .source-note { text-align:right; font-size:.72rem; color:#bbb; margin-top:8px; }
    .source-note a { color:#999; }

    /* LOADING */
    .page-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:#bbb; }
    .spinner { width:28px; height:28px; border:2px solid #e8e8ec; border-top-color:#7c3aed; border-radius:50%; animation:spin .7s linear infinite; margin-bottom:16px; }

    @media (max-width:640px) {
      .hero-inner { grid-template-columns:1fr; }
      .hero-img-wrap { display:none; }
      .hero-title { font-size:1.3rem; }
      .pc-grid, .display-grid { grid-template-columns:1fr 1fr; }
      .spec-grid  { grid-template-columns:repeat(2,1fr); }
      .thermal-grid { grid-template-columns:1fr; }
      .rating-grid { grid-template-columns:1fr; }
      .final-verdict { flex-direction:column; text-align:center; }
      .main { padding:20px 14px; }
      .hero { padding:28px 14px; }
      .nav  { padding:0 14px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html?tab=nbc" class="nav-back">← 목록</a>
  <div class="nav-score" id="navScore"></div>
</nav>

<div id="pageRoot">
  <div class="page-loading">
    <div class="spinner"></div>
    데이터 불러오는 중...
  </div>
</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8001' : 'https://api.koo-vis.com';
  const id   = new URLSearchParams(location.search).get('id');

  if (!id) {
    document.getElementById('pageRoot').innerHTML = '<div class="page-loading">id 파라미터가 없어요</div>';
  } else {
    fetch(`${API}/nbc/reviews/${id}/scrape`, {method:'POST'})
      .then(r => r.json())
      .then(({data}) => render(data))
      .catch(() => {
        document.getElementById('pageRoot').innerHTML = '<div class="page-loading" style="color:#f87">데이터를 가져오지 못했어요</div>';
      });
  }

  // ── 항목별 평점 한글 매핑 ────────────────────────────────
  const RATING_KO = {
    'Chassis': '케이싱', 'Display': '디스플레이', 'Battery': '배터리',
    'Application Performance': '앱 성능', 'Application Perf.': '앱 성능',
    'Games Performance': '게임 성능', 'AI Performance': 'AI 성능',
    'Keyboard': '소프트웨어', 'Keyboard / Software': '소프트웨어',
    'Pointing Device': '지문인식', 'Connectivity': '연결성',
    'Weight': '무게', 'Temperature': '발열', 'Noise': '소음',
    'Audio': '스피커', 'Camera': '카메라', 'Average': '경쟁사 평균',
  };

  // ── 색상 헬퍼 ───────────────────────────────────────────
  function ratingColor(v) {
    return v >= 90 ? '#7c3aed' : v >= 75 ? '#059669' : v >= 60 ? '#d97706' : '#dc2626';
  }
  function tempColor(val, min, max) {
    const t = (val - min) / (max - min || 1);
    if (t < 0.33) {
      return `rgb(${Math.round(t/0.33*80)},${Math.round(150+t/0.33*80)},${Math.round(200-t/0.33*80)})`;
    } else if (t < 0.66) {
      const tt = (t-0.33)/0.33;
      return `rgb(${Math.round(80+tt*175)},${Math.round(200-tt*50)},${Math.round(120-tt*80)})`;
    } else {
      const tt = (t-0.66)/0.34;
      return `rgb(${Math.round(220+tt*35)},${Math.round(150-tt*110)},${Math.round(40-tt*30)})`;
    }
  }

  function parsePCArray(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    try { return JSON.parse(val); } catch { return []; }
  }

  // ── 발열 그리드 렌더 ────────────────────────────────────
  function renderTempGrid(id, vals, minV, maxV) {
    const el = document.getElementById(id);
    if (!el || !vals.length) return;
    vals.forEach(v => {
      const bg = tempColor(v, minV, maxV);
      el.innerHTML += `<div class="temp-cell" style="background:${bg}">${v}°C</div>`;
    });
  }

  // ── 메인 렌더 ───────────────────────────────────────────
  function render(data) {
    const pros = parsePCArray(data.pros);
    const cons = parsePCArray(data.cons);
    const sub  = data.sub_ratings || {};
    const th   = data.thermal     || {};
    const disp = data.display     || {};

    // 타이틀
    document.title = data.title + ' — NBC Review';
    if (data.score) document.getElementById('navScore').textContent = data.score + '%';

    // 스펙 추출 (있는 것만)
    const specItems = [
      disp.typical ? {icon:'🖥️', name:'최대 밝기',    val:`${disp.typical.toLocaleString()} cd/m²`} : null,
      disp.peak    ? {icon:'✨', name:'피크 밝기',    val:`${disp.peak.toLocaleString()} cd/m²`, note:'HDR'} : null,
      sub['Battery'] ? {icon:'🔋', name:'배터리 평점', val:`${sub['Battery']}%`} : null,
      th.load_back_max ? {icon:'🌡️', name:'최고 발열',  val:`${th.load_back_max}°C`, note:'후면 풀 부하'} : null,
    ].filter(Boolean);

    const hasThermal = th.load_front_max || th.load_back_max;

    document.getElementById('pageRoot').innerHTML = `
      <!-- HERO -->
      <div class="hero">
        <div class="hero-inner fade fade-d1">
          <div>
            <div class="hero-tag">스마트폰 리뷰 · NotebookCheck</div>
            <h1 class="hero-title">${data.title}</h1>
            <p class="hero-sub">${data.description || (data.paras && data.paras[0]) || ''}</p>
          </div>
          <div class="hero-img-wrap fade fade-d2">
            ${data.thumbnail
              ? `<img class="hero-img" src="${data.thumbnail}" onerror="this.closest('.hero-img-wrap').style.display='none'">`
              : ''}
            ${data.score
              ? `<div class="score-badge"><div class="score-badge-num">${data.score}</div><div class="score-badge-pct">/100</div></div>`
              : ''}
          </div>
        </div>
      </div>

      <main class="main">

        <!-- PROS / CONS -->
        ${pros.length || cons.length ? `
        <div class="pc-grid fade fade-d2">
          <div class="pc-box">
            <div class="pc-title pro">장점</div>
            ${pros.map(p=>`<div class="pc-item"><span style="color:#059669;flex-shrink:0">+</span>${p}</div>`).join('')}
          </div>
          <div class="pc-box">
            <div class="pc-title con">단점</div>
            ${cons.map(c=>`<div class="pc-item"><span style="color:#dc2626;flex-shrink:0">−</span>${c}</div>`).join('')}
          </div>
        </div>` : ''}

        <!-- 항목별 평점 -->
        ${Object.keys(sub).length ? `
        <div class="rating-section fade fade-d2">
          <div class="section-header"><div class="section-title">항목별 평점</div></div>
          <div class="card">
            <div class="rating-grid" id="ratingGrid"></div>
          </div>
        </div>` : ''}

        <!-- 스펙 카드 -->
        ${specItems.length ? `
        <div class="fade fade-d3">
          <div class="section-header" style="margin-bottom:14px"><div class="section-title">주요 측정치</div></div>
          <div class="spec-grid">
            ${specItems.map(s=>`
              <div class="spec-card">
                <div class="spec-icon">${s.icon}</div>
                <div class="spec-name">${s.name}</div>
                <div class="spec-val">${s.val}</div>
                ${s.note ? `<div class="spec-note">${s.note}</div>` : ''}
              </div>`).join('')}
          </div>
        </div>` : ''}

        <!-- 디스플레이 -->
        ${disp.typical ? `
        <div class="display-section fade fade-d3">
          <div class="section-header"><div class="section-title">디스플레이 측정치</div></div>

          <!-- 밝기 핵심 지표 4개 -->
          <div class="display-grid" style="margin-bottom:12px">
            <div class="display-metric">
              <div class="display-metric-val">${disp.typical.toLocaleString()}</div>
              <div class="display-metric-unit">cd/m²</div>
              <div class="display-metric-label">일반 최대 밝기</div>
            </div>
            ${disp.peak ? `<div class="display-metric">
              <div class="display-metric-val" style="color:#7c3aed">${disp.peak.toLocaleString()}</div>
              <div class="display-metric-unit">cd/m²</div>
              <div class="display-metric-label">피크 밝기 (HDR)</div>
            </div>` : ''}
            ${disp.uniformity ? `<div class="display-metric">
              <div class="display-metric-val" style="color:#059669">${disp.uniformity}%</div>
              <div class="display-metric-unit"></div>
              <div class="display-metric-label">밝기 균일도</div>
            </div>` : ''}
            ${disp.pwm_hz ? `<div class="display-metric">
              <div class="display-metric-val" style="color:#d97706">${disp.pwm_hz} Hz</div>
              <div class="display-metric-unit">진폭 ${disp.pwm_amp}%</div>
              <div class="display-metric-label">PWM 깜빡임</div>
            </div>` : ''}
          </div>

          <!-- 밝기 균일도 3×3 맵 + 색상 정확도 2열 -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            ${disp.grid ? `
            <div class="card">
              <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:10px">밝기 균일도 맵 (cd/m²)</div>
              <div id="brightMapGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px"></div>
              <div style="font-size:.7rem;color:#bbb;text-align:center">중앙 최고 ${Math.max(...disp.grid).toLocaleString()} · 최저 ${Math.min(...disp.grid).toLocaleString()}</div>
            </div>` : ''}

            <div class="card">
              <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:12px">색상 정확도 <span style="font-weight:400">(낮을수록 우수)</span></div>
              ${disp.de2000 ? `<div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px">
                  <span style="color:#555">Colorchecker dE 2000</span>
                  <span style="font-weight:700;color:${disp.de2000 < 2 ? '#059669' : '#d97706'}">${disp.de2000}</span>
                </div>
                <div style="height:5px;background:#e8e8ec;border-radius:4px">
                  <div style="height:5px;width:${Math.min(disp.de2000/6*100,100)}%;background:${disp.de2000 < 2 ? '#059669' : '#d97706'};border-radius:4px"></div>
                </div>
                <div style="font-size:.67rem;color:#bbb;margin-top:2px">최대값 ${disp.de2000_max || '—'} · 목표 &lt;2.0</div>
              </div>` : ''}
              ${disp.grey_de ? `<div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px">
                  <span style="color:#555">Greyscale dE 2000</span>
                  <span style="font-weight:700;color:${disp.grey_de < 2 ? '#059669' : '#d97706'}">${disp.grey_de}</span>
                </div>
                <div style="height:5px;background:#e8e8ec;border-radius:4px">
                  <div style="height:5px;width:${Math.min(disp.grey_de/6*100,100)}%;background:${disp.grey_de < 2 ? '#059669' : '#d97706'};border-radius:4px"></div>
                </div>
              </div>` : ''}
              ${disp.gamma ? `<div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px">
                  <span style="color:#555">Gamma</span>
                  <span style="font-weight:700;color:#059669">${disp.gamma} <span style="font-size:.67rem;color:#bbb">(목표 2.2 · ${disp.gamma_acc}%)</span></span>
                </div>
                <div style="height:5px;background:#e8e8ec;border-radius:4px">
                  <div style="height:5px;width:${disp.gamma_acc}%;background:#059669;border-radius:4px"></div>
                </div>
              </div>` : ''}
              ${disp.cct ? `<div>
                <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px">
                  <span style="color:#555">색온도 (CCT)</span>
                  <span style="font-weight:700;color:#3b82f6">${disp.cct.toLocaleString()}K <span style="font-size:.67rem;color:#bbb">(${disp.cct_acc}% · 약간 차가움)</span></span>
                </div>
                <div style="height:5px;background:#e8e8ec;border-radius:4px">
                  <div style="height:5px;width:${disp.cct_acc}%;background:#3b82f6;border-radius:4px"></div>
                </div>
              </div>` : ''}
            </div>
          </div>

          <!-- 응답시간 -->
          ${disp.resp_fast ? `
          <div class="card" style="margin-bottom:0">
            <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin-bottom:10px">디스플레이 응답 시간</div>
            <div style="display:flex;gap:16px">
              <div style="text-align:center;flex:1;background:#f9f9fb;border-radius:8px;padding:12px">
                <div style="font-size:1.3rem;font-weight:800;color:#059669">${disp.resp_fast}ms</div>
                <div style="font-size:.7rem;color:#999;margin-top:2px">빠른 응답 (rise+fall)</div>
              </div>
              ${disp.resp_slow ? `<div style="text-align:center;flex:1;background:#f9f9fb;border-radius:8px;padding:12px">
                <div style="font-size:1.3rem;font-weight:800;color:#d97706">${disp.resp_slow}ms</div>
                <div style="font-size:.7rem;color:#999;margin-top:2px">일반 응답 (rise+fall)</div>
              </div>` : ''}
            </div>
          </div>` : ''}
        </div>` : ''}

        <!-- 발열 -->
        ${hasThermal ? `
        <div class="thermal-section fade fade-d3">
          <div class="section-header"><div class="section-title">발열 측정치</div><div class="section-sub">표면 온도 3×3 그리드</div></div>
          <div class="thermal-grid" id="thermalGrid"></div>
        </div>` : ''}

        <!-- 스토리지 벤치 -->
        ${data.storage ? `
        <div class="bench-section fade fade-d3">
          <div class="section-header"><div class="section-title">스토리지 벤치마크</div></div>
          <div class="bench-card">
            <div class="bench-title">Storage Speed (MB/s)</div>
            <div id="benchRows"></div>
          </div>
        </div>` : ''}

        <!-- 배터리 -->
        ${data.battery_life ? `
        <div class="fade fade-d4">
          <div class="section-header" style="margin-bottom:14px"><div class="section-title">배터리 지속 시간</div></div>
          <div class="battery-row">
            <div class="battery-icon">🔋</div>
            <div style="flex:1">
              <div style="font-size:.78rem;color:#999;margin-bottom:4px">WiFi 웹서핑 (v1.3)</div>
              <div class="battery-val">${data.battery_life}시간</div>
            </div>
            ${sub['Battery'] ? `<div style="text-align:right">
              <div style="font-size:.72rem;color:#999;margin-bottom:4px">배터리 평점</div>
              <div style="font-size:1.8rem;font-weight:800;color:#059669">${sub['Battery']}%</div>
            </div>` : ''}
          </div>
        </div>` : ''}

        <!-- 리뷰 본문 -->
        ${data.paras && data.paras.length ? `
        <div class="fade fade-d4">
          <div class="section-header" style="margin-bottom:14px"><div class="section-title">리뷰 본문 발췌</div></div>
          <div class="review-card">
            ${data.paras.slice(0,4).map(p=>`<p>${p}</p>`).join('')}
          </div>
        </div>` : ''}

        <!-- 최종 평점 -->
        ${data.score ? `
        <div class="final-verdict fade fade-d4">
          <div class="final-circle">
            <div class="final-num">${data.score}</div>
            <div class="final-label">/ 100</div>
          </div>
          <div class="final-text">
            <h3>${data.title}</h3>
            <p>${data.description || (data.paras && data.paras[0]) || ''}</p>
          </div>
        </div>` : ''}
        <div class="source-note">데이터 출처: <a href="${data.url}" target="_blank">NotebookCheck</a></div>

      </main>`;

    // ── 밝기 균일도 맵 ──────────────────────────────────
    const brightMapEl = document.getElementById('brightMapGrid');
    if (brightMapEl && disp.grid) {
      const bMin = Math.min(...disp.grid), bMax = Math.max(...disp.grid);
      disp.grid.forEach(v => {
        const t = (v - bMin) / (bMax - bMin || 1);
        const bg = `hsl(${220 - t * 180}, 70%, ${40 + t * 25}%)`;
        const isCtr = v === bMax;
        brightMapEl.innerHTML += `<div class="bmap-cell" style="background:${bg}${isCtr ? ';box-shadow:0 0 0 2px #7c3aed' : ''}">${v}</div>`;
      });
    }

    // ── 항목별 평점 바 ──────────────────────────────────
    const grid = document.getElementById('ratingGrid');
    if (grid) {
      Object.entries(sub).forEach(([label, val]) => {
        const c = ratingColor(val);
        const ko = RATING_KO[label] || label;
        grid.innerHTML += `
          <div class="rating-row">
            <div class="rating-label">${ko}</div>
            <div class="rating-bar-wrap">
              <div class="rating-bar-fill" style="width:0%;background:${c}" data-val="${val}"></div>
            </div>
            <div class="rating-val" style="color:${c}">${val}%</div>
          </div>`;
      });
    }

    // ── 발열 히트맵 ─────────────────────────────────────
    const tg = document.getElementById('thermalGrid');
    if (tg) {
      const cards = [
        { id:'tIdF', label:'전면',  badge:'badge-idle', vals: th.idle_front  || [], min:23, max:27 },
        { id:'tIdB', label:'후면',  badge:'badge-idle', vals: th.idle_back   || [], min:23, max:27 },
        { id:'tLdF', label:'전면',  badge:'badge-load', vals: th.load_front  || [], min:34, max:52 },
        { id:'tLdB', label:'후면',  badge:'badge-load', vals: th.load_back   || [], min:34, max:52 },
      ].filter(c => c.vals.length);

      cards.forEach(c => {
        const max = Math.max(...c.vals).toFixed(1);
        const avg = (c.vals.reduce((a,b)=>a+b,0)/c.vals.length).toFixed(1);
        tg.innerHTML += `
          <div class="thermal-card">
            <div class="thermal-card-title">
              ${c.label}
              <span class="thermal-badge ${c.badge}">${c.badge==='badge-idle'?'유휴':'풀 부하'}</span>
            </div>
            <div class="temp-map" id="${c.id}"></div>
            <div class="temp-stat-row">
              <div class="temp-stat"><div class="temp-stat-label">최고</div><div class="temp-stat-val">${max}°C</div></div>
              <div class="temp-stat"><div class="temp-stat-label">평균</div><div class="temp-stat-val">${avg}°C</div></div>
            </div>
          </div>`;
        renderTempGrid(c.id, c.vals, c.min, c.max);
      });
    }

    // ── 스토리지 벤치 ────────────────────────────────────
    const benchEl = document.getElementById('benchRows');
    if (benchEl && data.storage) {
      const maxVal = Math.max(...Object.values(data.storage));
      Object.entries(data.storage).forEach(([label, val]) => {
        benchEl.innerHTML += `
          <div class="bench-row">
            <div class="bench-label">${label}</div>
            <div class="bench-bar-wrap">
              <div class="bench-bar-fill" style="width:0%" data-val="${Math.round(val/maxVal*100)}"></div>
            </div>
            <div class="bench-val">${val.toLocaleString()} MB/s</div>
          </div>`;
      });
    }

    // ── 스크롤 애니메이션 ────────────────────────────────
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        e.target.querySelectorAll('[data-val]').forEach(bar => {
          setTimeout(() => { bar.style.width = bar.dataset.val + '%'; }, 80);
        });
        io.unobserve(e.target);
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.rating-section, .bench-section').forEach(el => io.observe(el));
  }
</script>
</body>
</html>
